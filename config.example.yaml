timezone: America/New_York

database_path: data/context.db
export_dir: exports
combined_export_file: project_context.md

telegram:
  session_name: telegram_context_sync
  request_limit: 1000

markdown:
  max_messages_per_file: 500
  include_sender: true
  include_source_identifier: true

google:
  enabled: false
  credentials_path: credentials/client_secret.json
  token_path: token.json
  document_id: ""
  document_title: "Telegram Context Sync - Project Context"

chats:
  - name: example_project_group
    identifier: "example_public_username_or_chat_id"
    enabled: true
    export_file: "example_project_group.md"
